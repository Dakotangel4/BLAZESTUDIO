kind = "web"
previewPath = "/"
title = "Blaze Studio"
version = "1.0.0"
id = "artifacts/blaze-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21028

[services.development]
run = "pnpm --filter @workspace/blaze-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blaze-studio", "run", "build" ]
publicDir = "artifacts/blaze-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21028"
BASE_PATH = "/"
