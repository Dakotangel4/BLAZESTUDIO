openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: admin
    description: Admin (password-protected)
  - name: blog
    description: Public-facing blog
  - name: testimonials
    description: Public-facing testimonials
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact-submissions:
    post:
      operationId: createContactSubmission
      tags: [contact]
      summary: Submit a contact form
      description: Stores a new contact form submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResult"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /blog/posts:
    get:
      operationId: listPublicBlogPosts
      tags: [blog]
      summary: List published blog posts
      description: |
        Returns blog posts that are currently visible to the public.
        Includes posts with status `published` whose `publishedAt` is in the past,
        and posts with status `scheduled` whose `scheduledAt` is in the past
        (i.e. they have reached their scheduled publish time).
      parameters:
        - name: category
          in: query
          required: false
          description: Filter by category slug
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: Free-text search across title and excerpt
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Paginated list of public posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBlogPostList"
  /blog/posts/{slug}:
    get:
      operationId: getPublicBlogPost
      tags: [blog]
      summary: Read a single published blog post by slug
      description: |
        Returns a single public post by slug, including the previous and next
        post (by publish date) and a list of related posts in the same category.
        Returns 404 if no public post matches the slug.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The public post envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBlogPostDetail"
        "404":
          description: Not found or not yet published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /blog/categories:
    get:
      operationId: listPublicBlogCategories
      tags: [blog]
      summary: List active blog categories
      description: |
        Returns categories that have at least one publicly-visible post,
        plus the post count for each.
      responses:
        "200":
          description: Public categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBlogCategoryList"
  /blog/sitemap:
    get:
      operationId: getPublicBlogSitemap
      tags: [blog]
      summary: Sitemap entries for all public blog posts
      description: |
        Returns the slug and last-updated timestamp for every publicly visible
        blog post, suitable for generating a sitemap.xml.
      responses:
        "200":
          description: Sitemap entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBlogSitemap"
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      description: Authenticates with the admin password and starts a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      description: Clears the admin session.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
  /admin/session:
    get:
      operationId: adminGetSession
      tags: [admin]
      summary: Read admin session
      description: Returns whether the caller has a valid admin session.
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
  /admin/leads:
    get:
      operationId: adminListLeads
      tags: [admin]
      summary: List all contact submissions
      description: Returns every contact submission, newest first. Requires admin session.
      responses:
        "200":
          description: Leads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLeadList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/leads/{id}:
    patch:
      operationId: adminUpdateLead
      tags: [admin]
      summary: Update a lead
      description: Updates fields on a lead (currently status). Requires admin session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLeadUpdateInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLead"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteLead
      tags: [admin]
      summary: Delete a lead
      description: Deletes a lead permanently. Requires admin session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-categories:
    get:
      operationId: adminListBlogCategories
      tags: [admin]
      summary: List blog categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategoryList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateBlogCategory
      tags: [admin]
      summary: Create a blog category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategory"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate name or slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-categories/{id}:
    patch:
      operationId: adminUpdateBlogCategory
      tags: [admin]
      summary: Update a blog category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteBlogCategory
      tags: [admin]
      summary: Delete a blog category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts:
    get:
      operationId: adminListBlogPosts
      tags: [admin]
      summary: List all blog posts
      responses:
        "200":
          description: Blog posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPostList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateBlogPost
      tags: [admin]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts/{id}:
    get:
      operationId: adminGetBlogPost
      tags: [admin]
      summary: Get a single blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateBlogPost
      tags: [admin]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogPostInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteBlogPost
      tags: [admin]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /testimonials:
    get:
      operationId: listPublicTestimonials
      tags: [testimonials]
      summary: List published testimonials
      description: Returns all published testimonials in display order.
      responses:
        "200":
          description: Public testimonials list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTestimonialList"
  /admin/testimonials:
    get:
      operationId: adminListTestimonials
      tags: [admin]
      summary: List all testimonials (admin)
      responses:
        "200":
          description: Testimonials list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTestimonialList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateTestimonial
      tags: [admin]
      summary: Create a testimonial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTestimonialInput"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTestimonial"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/testimonials/{id}:
    get:
      operationId: adminGetTestimonial
      tags: [admin]
      summary: Get a single testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTestimonial"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateTestimonial
      tags: [admin]
      summary: Update a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTestimonialUpdateInput"
      responses:
        "200":
          description: Updated testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTestimonial"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteTestimonial
      tags: [admin]
      summary: Delete a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/testimonials/reorder:
    post:
      operationId: adminReorderTestimonials
      tags: [admin]
      summary: Reorder testimonials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTestimonialReorderInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTestimonialList"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts/bulk:
    post:
      operationId: adminBulkBlogPosts
      tags: [admin]
      summary: Bulk action on blog posts (delete / publish / unpublish)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogBulkInput"
      responses:
        "200":
          description: Bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogBulkResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        phone:
          type: string
          minLength: 7
          maxLength: 30
        email:
          type: string
          format: email
          maxLength: 200
        website:
          type: string
          maxLength: 200
        service:
          type: string
          minLength: 1
          maxLength: 120
        message:
          type: string
          minLength: 10
          maxLength: 4000
        source:
          type: string
          maxLength: 60
      required:
        - name
        - phone
        - email
        - service
        - message
    ContactSubmissionResult:
      type: object
      properties:
        id:
          type: integer
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - receivedAt
    LeadStatus:
      type: string
      enum: [new, reviewed, responded]
    AdminLoginInput:
      type: object
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 500
      required:
        - password
    AdminSession:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated
    AdminLead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
          nullable: true
        service:
          type: string
        message:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - service
        - message
        - source
        - status
        - createdAt
    AdminLeadList:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/AdminLead"
      required:
        - leads
    AdminLeadUpdateInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
    AdminDeleteResult:
      type: object
      properties:
        id:
          type: integer
        deleted:
          type: boolean
      required:
        - id
        - deleted
    BlogStatus:
      type: string
      enum: [draft, published, scheduled]
    AdminBlogCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - postCount
        - createdAt
    AdminBlogCategoryList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/AdminBlogCategory"
      required:
        - categories
    AdminBlogCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        slug:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 500
          nullable: true
      required:
        - name
    AdminBlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
        metaDescription:
          type: string
        categoryId:
          type: integer
          nullable: true
        categoryName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        status:
          $ref: "#/components/schemas/BlogStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        readingTime:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - metaTitle
        - metaDescription
        - tags
        - author
        - status
        - readingTime
        - createdAt
        - updatedAt
    AdminBlogPostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/AdminBlogPost"
      required:
        - posts
    AdminBlogPostInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 200
        excerpt:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 200000
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
          maxLength: 200
        metaDescription:
          type: string
          maxLength: 400
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
            maxLength: 60
          maxItems: 20
        author:
          type: string
          maxLength: 120
        status:
          $ref: "#/components/schemas/BlogStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
    AdminBlogBulkInput:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          minItems: 1
        action:
          type: string
          enum: [delete, publish, unpublish]
      required:
        - ids
        - action
    AdminBlogBulkResult:
      type: object
      properties:
        affected:
          type: integer
        action:
          type: string
      required:
        - affected
        - action
    PublicBlogCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        postCount:
          type: integer
      required:
        - id
        - name
        - slug
        - postCount
    PublicBlogCategoryList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/PublicBlogCategory"
      required:
        - categories
    PublicBlogPostSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        featuredImage:
          type: string
          nullable: true
        categorySlug:
          type: string
          nullable: true
        categoryName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        readingTime:
          type: integer
      required:
        - id
        - title
        - slug
        - excerpt
        - tags
        - author
        - publishedAt
        - updatedAt
        - readingTime
    PublicBlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
        metaDescription:
          type: string
        categorySlug:
          type: string
          nullable: true
        categoryName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        readingTime:
          type: integer
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - metaTitle
        - metaDescription
        - tags
        - author
        - publishedAt
        - updatedAt
        - readingTime
