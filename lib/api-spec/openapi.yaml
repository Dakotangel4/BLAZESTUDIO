openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact-submissions:
    post:
      operationId: createContactSubmission
      tags: [contact]
      summary: Submit a contact form
      description: Stores a new contact form submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResult"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        phone:
          type: string
          minLength: 7
          maxLength: 30
        email:
          type: string
          format: email
          maxLength: 200
        website:
          type: string
          maxLength: 200
        service:
          type: string
          minLength: 1
          maxLength: 120
        message:
          type: string
          minLength: 10
          maxLength: 4000
        source:
          type: string
          maxLength: 60
      required:
        - name
        - phone
        - email
        - service
        - message
    ContactSubmissionResult:
      type: object
      properties:
        id:
          type: integer
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - receivedAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
      required:
        - error
