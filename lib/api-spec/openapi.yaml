openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: admin
    description: Admin (password-protected)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact-submissions:
    post:
      operationId: createContactSubmission
      tags: [contact]
      summary: Submit a contact form
      description: Stores a new contact form submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResult"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      description: Authenticates with the admin password and starts a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      description: Clears the admin session.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
  /admin/session:
    get:
      operationId: adminGetSession
      tags: [admin]
      summary: Read admin session
      description: Returns whether the caller has a valid admin session.
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
  /admin/leads:
    get:
      operationId: adminListLeads
      tags: [admin]
      summary: List all contact submissions
      description: Returns every contact submission, newest first. Requires admin session.
      responses:
        "200":
          description: Leads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLeadList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/leads/{id}:
    patch:
      operationId: adminUpdateLead
      tags: [admin]
      summary: Update a lead
      description: Updates fields on a lead (currently status). Requires admin session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLeadUpdateInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLead"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteLead
      tags: [admin]
      summary: Delete a lead
      description: Deletes a lead permanently. Requires admin session.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-categories:
    get:
      operationId: adminListBlogCategories
      tags: [admin]
      summary: List blog categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategoryList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateBlogCategory
      tags: [admin]
      summary: Create a blog category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogCategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategory"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate name or slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-categories/{id}:
    patch:
      operationId: adminUpdateBlogCategory
      tags: [admin]
      summary: Update a blog category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogCategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteBlogCategory
      tags: [admin]
      summary: Delete a blog category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts:
    get:
      operationId: adminListBlogPosts
      tags: [admin]
      summary: List all blog posts
      responses:
        "200":
          description: Blog posts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPostList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateBlogPost
      tags: [admin]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts/{id}:
    get:
      operationId: adminGetBlogPost
      tags: [admin]
      summary: Get a single blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateBlogPost
      tags: [admin]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogPostInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteBlogPost
      tags: [admin]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/blog-posts/bulk:
    post:
      operationId: adminBulkBlogPosts
      tags: [admin]
      summary: Bulk action on blog posts (delete / publish / unpublish)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBlogBulkInput"
      responses:
        "200":
          description: Bulk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBlogBulkResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        phone:
          type: string
          minLength: 7
          maxLength: 30
        email:
          type: string
          format: email
          maxLength: 200
        website:
          type: string
          maxLength: 200
        service:
          type: string
          minLength: 1
          maxLength: 120
        message:
          type: string
          minLength: 10
          maxLength: 4000
        source:
          type: string
          maxLength: 60
      required:
        - name
        - phone
        - email
        - service
        - message
    ContactSubmissionResult:
      type: object
      properties:
        id:
          type: integer
        receivedAt:
          type: string
          format: date-time
      required:
        - id
        - receivedAt
    LeadStatus:
      type: string
      enum: [new, reviewed, responded]
    AdminLoginInput:
      type: object
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 500
      required:
        - password
    AdminSession:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated
    AdminLead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
          nullable: true
        service:
          type: string
        message:
          type: string
        source:
          type: string
        status:
          $ref: "#/components/schemas/LeadStatus"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - service
        - message
        - source
        - status
        - createdAt
    AdminLeadList:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/AdminLead"
      required:
        - leads
    AdminLeadUpdateInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
    AdminDeleteResult:
      type: object
      properties:
        id:
          type: integer
        deleted:
          type: boolean
      required:
        - id
        - deleted
    BlogStatus:
      type: string
      enum: [draft, published, scheduled]
    AdminBlogCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - postCount
        - createdAt
    AdminBlogCategoryList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/AdminBlogCategory"
      required:
        - categories
    AdminBlogCategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        slug:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          maxLength: 500
          nullable: true
      required:
        - name
    AdminBlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
        metaDescription:
          type: string
        categoryId:
          type: integer
          nullable: true
        categoryName:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        author:
          type: string
        status:
          $ref: "#/components/schemas/BlogStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        readingTime:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - excerpt
        - content
        - metaTitle
        - metaDescription
        - tags
        - author
        - status
        - readingTime
        - createdAt
        - updatedAt
    AdminBlogPostList:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/AdminBlogPost"
      required:
        - posts
    AdminBlogPostInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 200
        excerpt:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 200000
        featuredImage:
          type: string
          nullable: true
        metaTitle:
          type: string
          maxLength: 200
        metaDescription:
          type: string
          maxLength: 400
        categoryId:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
            maxLength: 60
          maxItems: 20
        author:
          type: string
          maxLength: 120
        status:
          $ref: "#/components/schemas/BlogStatus"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
    AdminBlogBulkInput:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          minItems: 1
        action:
          type: string
          enum: [delete, publish, unpublish]
      required:
        - ids
        - action
    AdminBlogBulkResult:
      type: object
      properties:
        affected:
          type: integer
        action:
          type: string
      required:
        - affected
        - action
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
      required:
        - error
